global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # No Alertmanager in V1 — alerts visible in Prometheus UI

rule_files:
  - alert.rules.yml

scrape_configs:

  # ── Spring Boot (Micrometer / Actuator) ──────────────────────────────────────
  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['spring-boot:8080']
        labels:
          service: backend
          env: docker

  # ── FastAPI (custom prometheus_client endpoint) ───────────────────────────────
  - job_name: fastapi
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['fastapi:8000']
        labels:
          service: ai-service
          env: docker

  # ── RabbitMQ (management plugin Prometheus exporter) ─────────────────────────
  - job_name: rabbitmq
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: rabbitmq
          env: docker

  # ── Prometheus self-monitoring ────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
