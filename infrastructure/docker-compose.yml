name: devops-copilot

# ─── Load infrastructure secrets ────────────────────────────────────────────
# Copy .env.example → .env and fill in passwords before running
# ALSO update backend/.env and ai-service/.env to match these passwords

networks:
  devops-copilot-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

# ─── Services (start order is enforced via depends_on + healthchecks) ────────
#   1. postgres   2. redis   3. rabbitmq
#   4. spring-boot (needs all three)
#   5. fastapi    (needs rabbitmq + postgres)
#   6. frontend   (needs spring-boot)
#   7. prometheus 8. grafana

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devops-postgres
    environment:
      POSTGRES_DB: devops_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-devops_root_2026}
      # Passed to init.sql via these extra env vars
      APPWRITER_PASSWORD: ${APPWRITER_PASSWORD:-devops_write_2026}
      APPREADER_PASSWORD: ${APPREADER_PASSWORD:-devops_read_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - devops-copilot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devops_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devops-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - devops-copilot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: devops-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-devops_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-devops_rabbit_2026}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672
    networks:
      - devops-copilot-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  spring-boot:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: devops-backend
    env_file:
      - ../backend/.env
    environment:
      # Override hostnames to Docker service names
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devops_copilot
      SPRING_DATASOURCE_USERNAME: appwriter
      SPRING_DATASOURCE_PASSWORD: ${APPWRITER_PASSWORD:-devops_write_2026}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-devops_rabbit}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-devops_rabbit_2026}
      SPRING_REDIS_HOST: redis
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - devops-copilot-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ── FastAPI AI Service ────────────────────────────────────────────────────────
  fastapi:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: devops-fastapi
    env_file:
      - ../ai-service/.env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-devops_rabbit}:${RABBITMQ_PASSWORD:-devops_rabbit_2026}@rabbitmq:5672/
      POSTGRES_READ_URL: postgresql://appreader:${APPREADER_PASSWORD:-devops_read_2026}@postgres:5432/devops_copilot
    ports:
      - "8000:8000"
    networks:
      - devops-copilot-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: http://localhost:8080/ws
    container_name: devops-frontend
    ports:
      - "3000:3000"
    networks:
      - devops-copilot-net
    depends_on:
      spring-boot:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get({host:'127.0.0.1',port:3000,path:'/'}, r=>{process.exit(r.statusCode>=200&&r.statusCode<500?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - devops-copilot-net
    depends_on:
      - spring-boot
      - fastapi
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ops_admin_2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"    # Grafana on 3001 (3000 is taken by frontend)
    networks:
      - devops-copilot-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
